{"openapi":"3.1.1","info":{"title":"Notes","description":"Productboard API v2 for managing notes and their relationships to other entities. Use these endpoints to create, list, update, and delete notes, and to link them to entities, companies, and other resources.","version":"2.0.0","contact":{"name":"Productboard Support","url":"https://support.productboard.com","email":"support@productboard.com"},"license":{"name":"Productboard Proprietary","url":"https://www.productboard.com/"}},"servers":[{"url":"https://api.productboard.com/v2","description":"Production server"}],"security":[{"BearerAuth":[]},{"OAuth2":["notes:read","notes:write","notes:delete"]}],"tags":[{"name":"notes","description":"Operations related to notes and their relationships."}],"paths":{"/notes/configurations":{"get":{"tags":["notes"],"summary":"List configurations","description":"Returns configuration metadata for note types, including supported fields, patch operations, and validation rules.\n\nUse this endpoint to programmatically discover which fields are available, what note types are supported,\nand how your workspace is configured.\n\n### Filtering by Type\n\nBy default, this endpoint returns configurations for all available note types (`textNote`, `conversationNote`, `opportunityNote`).\n\nYou can filter results to specific types using the optional `type[]` query parameter:\n\n- `type[]=textNote`\n- `type[]=textNote&type[]=conversationNote`\n\nFor backward compatibility, the API also accepts a single `type` query parameter with one value,\nfor example `type=textNote`.\n\nLegacy aliases (`simple`, `conversation`, `opportunity`) are also accepted and normalized to the canonical values above.\n","operationId":"listNoteConfigurations","security":[{"BearerAuth":["notes:read"]}],"parameters":[{"name":"type[]","in":"query","required":false,"schema":{"type":"array","items":{"$ref":"#/components/schemas/NoteTypeInput"}},"style":"form","explode":true,"description":"Optional array of note types to filter results.\nValid values: textNote, conversationNote, opportunityNote.\nLegacy aliases simple, conversation, opportunity are also accepted.\nExample: type[]=textNote&type[]=conversationNote\n"},{"name":"type","in":"query","required":false,"schema":{"$ref":"#/components/schemas/NoteTypeInput"},"description":"Optional single note type filter for backward compatibility.\nValid values: textNote, conversationNote, opportunityNote.\nLegacy aliases simple, conversation, opportunity are also accepted.\nExample: type=textNote\nNote: Use `type[]` to filter by multiple note types.\n"}],"responses":{"200":{"description":"A list of entity configurations","content":{"application/json":{"schema":{"type":"object","properties":{"data":{"type":"array","items":{"$ref":"#/components/schemas/Configuration"}}}},"examples":{"all-types":{"summary":"All entity configurations","value":{"data":[{"type":"textNote","fields":{"name":{"id":"name","name":"Name","path":"/fields/name","schema":{"type":"string"},"lifecycle":{"create":{"set":true},"update":{"set":true},"patch":{"set":true}},"constraints":{"required":true}}}},{"type":"conversationNote","fields":{"name":{"id":"name","name":"Name","path":"/fields/name","schema":{"type":"string"},"lifecycle":{"create":{"set":true},"update":{"set":true},"patch":{"set":true}},"constraints":{"required":true}}}},{"type":"opportunityNote","fields":{"name":{"id":"name","name":"Name","path":"/fields/name","schema":{"type":"string"},"lifecycle":{"create":{"set":true},"update":{"set":true},"patch":{"set":true}},"constraints":{"required":true}}}}]}},"filtered":{"summary":"Filtered entity configurations","value":{"data":[{"type":"textNote","fields":{"name":{"id":"name","name":"Name","path":"/fields/name","schema":{"type":"string"},"lifecycle":{"create":{"set":true},"update":{"set":true},"patch":{"set":true}},"constraints":{"required":true}}}}]}}}}}},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}}},"/notes/configurations/{type}":{"get":{"tags":["notes"],"summary":"Get configuration","description":"Returns configuration metadata for a specific note type, including supported fields, patch operations, and validation rules.\n\nUse this endpoint to programmatically discover the configuration for a specific note type.\n","operationId":"getNoteConfiguration","security":[{"BearerAuth":["notes:read"]}],"parameters":[{"name":"type","in":"path","required":true,"schema":{"$ref":"#/components/schemas/NoteTypeInput"},"description":"The note type to retrieve configuration for. Legacy note type aliases are also accepted.\n"}],"responses":{"200":{"description":"Configuration details","content":{"application/json":{"schema":{"type":"object","properties":{"data":{"$ref":"#/components/schemas/Configuration"}}},"examples":{"text-note":{"summary":"Text note configuration","value":{"data":{"type":"textNote","fields":{"name":{"id":"name","name":"Name","path":"/fields/name","schema":{"type":"string"},"lifecycle":{"create":{"set":true},"update":{"set":true},"patch":{"set":true}},"constraints":{"required":true}}}}}},"conversation-note":{"summary":"Conversation note configuration","value":{"data":{"type":"conversationNote","fields":{"name":{"id":"name","name":"Name","path":"/fields/name","schema":{"type":"string"},"lifecycle":{"create":{"set":true},"update":{"set":true},"patch":{"set":true}},"constraints":{"required":true}}}}}}}}}},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}}},"/notes":{"post":{"tags":["notes"],"summary":"Create note","description":"Creates a new note in your workspace.\nNotes represent individual pieces of feedback from customers, internal teams, or external systems.\n\nYou must specify the `type` of note you're creating:\n- `\"textNote\"` - for plain, unstructured notes\n- `\"conversationNote\"` - for structured messages (e.g., from chat, email, or support systems)\n\nLegacy aliases (`simple`, `conversation`, `opportunity`) are accepted on input and normalized before business rules are applied.\n> ⚠️ Notes of type `opportunityNote` cannot be created via the API.\n\n## Field Requirements and Configuration\n\nThe `fields.name` attribute is **required** for all note types.\nOther fields depend on the selected note type and your workspace configuration.\nUse the [`/v2/notes/configurations`](#/paths/~1v2~1notes~1configurations/get) endpoint to discover available fields for each type.\n\nNotes can also be linked to Customers entities or Product links (like features) via relationships.\n","operationId":"createNote","security":[{"BearerAuth":["notes:write"]}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","required":["data"],"properties":{"data":{"type":"object","required":["type","fields"],"properties":{"type":{"$ref":"#/components/schemas/NoteTypeInput","example":"textNote"},"fields":{"$ref":"#/components/schemas/NoteCreateOrUpdateFields"},"metadata":{"$ref":"#/components/schemas/EntityMetadata"},"relationships":{"type":"array","description":"Optional relationships to create with the note.\nUsed for atomically linking notes to customers (users or companies) and product links (like features).\n","items":{"$ref":"#/components/schemas/NoteCreateRelationship"}}}}}},"examples":{"text-note-basic-fields":{"summary":"Create a text note with basic fields","value":{"data":{"type":"textNote","fields":{"name":"New note","content":"This is a new note content."}}}},"text-note-advanced-fields":{"summary":"Create a text note with advanced fields","value":{"data":{"type":"textNote","fields":{"name":"New note","tags":[{"name":"product"},{"name":"q2"}],"content":"This is a new note content.","owner":{"email":"jane.doe@example.com"},"creator":{"email":"john.doe@example.com"}}}}},"text-note-with-metadata-source":{"summary":"Create a text note with metadata source","value":{"data":{"type":"textNote","fields":{"name":"Note from external system","content":"This note was imported from an external system."},"metadata":{"source":{"system":"support","recordId":"ticket-12345","url":"https://support.example.com/ticket/12345"}}}}},"text-note-with-relationships":{"summary":"Create a text note with customer and feature relationships","value":{"data":{"type":"textNote","fields":{"name":"Note with relationships","content":"This note is linked to a customer and features"},"relationships":[{"type":"customer","target":{"id":"123e4567-e89b-12d3-a456-426614174000","type":"user"}},{"type":"link","target":{"id":"223e4567-e89b-12d3-a456-426614174001","type":"link"}},{"type":"link","target":{"id":"323e4567-e89b-12d3-a456-426614174002","type":"link"}}]}}},"simple-note-with-customer-by-email":{"summary":"Create a simple note with customer assigned by email","value":{"data":{"type":"simple","fields":{"name":"Note with email-based customer","content":"Customer assigned by email lookup"},"relationships":[{"type":"customer","target":{"email":"john@acme.com","type":"user"}}]}}},"conversation-note":{"summary":"Create a conversation note","value":{"data":{"type":"conversationNote","fields":{"name":"Conversation Note","content":[{"externalId":"000","content":"Hello","timestamp":"2023-10-01T11:00:00Z","authorType":"agent"},{"externalId":"111","content":"world","authorName":"John Doe","authorType":"customer","timestamp":"2023-10-01T12:00:00Z"}],"tags":[{"name":"support"}],"owner":{"email":"john.doe@example.com"},"creator":{"email":"john.doe@example.com"}}}}},"conversation-note-with-relationships":{"summary":"Create a conversation note with company customer relationship","value":{"data":{"type":"conversationNote","fields":{"name":"Conversation Note with Company","content":[{"externalId":"000","content":"Hello from company","timestamp":"2023-10-01T11:00:00Z","authorType":"agent"}]},"relationships":[{"type":"customer","target":{"id":"123e4567-e89b-12d3-a456-426614174100","type":"company"}}]}}}}}}},"responses":{"201":{"description":"Note created successfully","content":{"application/json":{"schema":{"$ref":"#/components/schemas/NoteReferenceResponse"},"examples":{"text-note":{"summary":"Text note response","value":{"data":{"id":"123e4567-e89b-12d3-a456-426614174000","type":"textNote","links":{"self":"https://api.productboard.com/v2/notes/123e4567-e89b-12d3-a456-426614174000"}}}},"conversation-note":{"summary":"Conversation note response","value":{"data":{"id":"223e4567-e89b-12d3-a456-426614174000","type":"conversationNote","links":{"self":"https://api.productboard.com/v2/notes/223e4567-e89b-12d3-a456-426614174001"}}}}}}}},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"422":{"$ref":"#/components/responses/UnprocessableEntityResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}},"get":{"tags":["notes"],"summary":"List notes","description":"Retrieves a list of notes from your workspace.\n\n> Without the `members:pii:read` scope, owner and creator email fields are returned as `[redacted]`. Filtering by `owner[email]` or `creator[email]` requires the `members:pii:read` scope.\n\n- Notes are sorted by creation date, newest first.\n- You can filter results using query parameters like `archived`, `processed`, `owner[email]`, `creator[email]`, `metadata[source][system]`, `metadata[source][recordId]`, or date/time ranges.\n- Use the `pageCursor` parameter to paginate through results.\n- Use the `fields` query parameter to optimize response size (default: all non-null fields, use `fields=all` to include null values, or `fields=name,tags` for specific fields).\n\n> To discover available fields\nuse the [`/v2/notes/configurations`](#/paths/~1v2~1notes~1configurations/get) endpoint.\n\n### Date/Time Filtering\n\nYou can filter notes by creation or update timestamps using ISO-8601 date-time format:\n- Use `createdFrom` and `createdTo` to filter by creation date (inclusive bounds)\n- Use `updatedFrom` and `updatedTo` to filter by update date (inclusive bounds)\n- All date/time filters can be combined with each other and with other filters\n- Date ranges must be valid (From <= To) or a 400 error will be returned\n\n### Filtering combinations\n\nSome combinations of the `archived` and `processed` flags result in empty or unexpected results.\nUse the following table to understand which notes are returned based on the filter values:\n\n| `archived` | `processed` | Result                    |\n|------------|-------------|---------------------------|\n| –          | –           | All notes                 |\n| `true`     | `true`      | None                      |\n| `true`     | `false`     | Archived                  |\n| `false`    | `true`      | Processed                 |\n| `false`    | `false`     | Unprocessed               |\n| `true`     | –           | Archived                  |\n| `false`    | –           | Processed + unprocessed   |\n| –          | `true`      | Processed                 |\n| –          | `false`     | Archived + unprocessed    |\n\n> **Note**: Archived notes always return `processed: false` in the API response, regardless of their actual processing state. This is a known limitation of the system.\n","operationId":"listNotes","security":[{"BearerAuth":["notes:read"]}],"parameters":[{"name":"pageCursor","in":"query","description":"Cursor for pagination.","required":false,"schema":{"type":"string"}},{"name":"archived","in":"query","description":"Filter notes by archived status.","required":false,"schema":{"type":"boolean","example":true}},{"name":"processed","in":"query","description":"Filter notes by processed status.","required":false,"schema":{"type":"boolean","example":true}},{"name":"owner[id]","in":"query","description":"Filter notes by owner UUID.","required":false,"schema":{"type":"string","format":"uuid"},"example":"e9f642b4-f0f8-4acc-ba0c-acc76453f60e"},{"name":"owner[email]","in":"query","description":"Filter notes by owner email.","required":false,"schema":{"type":"string","example":"jane.doe@example.com"}},{"name":"creator[id]","in":"query","description":"Filter notes by creator UUID.","required":false,"schema":{"type":"string","format":"uuid"},"example":"e9f642b4-f0f8-4acc-ba0c-acc76453f60e"},{"name":"creator[email]","in":"query","description":"Filter notes by creator email.","required":false,"schema":{"type":"string","example":"john.doe@example.com"}},{"name":"metadata[source][system]","in":"query","description":"Filter notes by the source system name from metadata.source.\nCan be combined with metadata[source][recordId] and other filters.\n","required":false,"schema":{"type":"string","example":"support"}},{"name":"metadata[source][recordId]","in":"query","description":"Filter notes by the source record ID from metadata.source.\nCan be combined with metadata[source][system] and other filters.\n","required":false,"schema":{"type":"string","example":"ticket-12345"}},{"name":"createdFrom","in":"query","description":"Filter notes created on or after this date/time (inclusive).\nMust be in ISO-8601 format (e.g., \"2023-10-01T12:00:00Z\").\nCan be combined with createdTo to define a range.\n","required":false,"schema":{"type":"string","format":"date-time","example":"2023-10-01T00:00:00Z"}},{"name":"createdTo","in":"query","description":"Filter notes created on or before this date/time (inclusive).\nMust be in ISO-8601 format (e.g., \"2023-12-31T23:59:59Z\").\nCan be combined with createdFrom to define a range.\n","required":false,"schema":{"type":"string","format":"date-time","example":"2023-12-31T23:59:59Z"}},{"name":"updatedFrom","in":"query","description":"Filter notes updated on or after this date/time (inclusive).\nMust be in ISO-8601 format (e.g., \"2023-10-01T12:00:00Z\").\nCan be combined with updatedTo to define a range.\n","required":false,"schema":{"type":"string","format":"date-time","example":"2023-10-01T00:00:00Z"}},{"name":"updatedTo","in":"query","description":"Filter notes updated on or before this date/time (inclusive).\nMust be in ISO-8601 format (e.g., \"2023-12-31T23:59:59Z\").\nCan be combined with updatedFrom to define a range.\n","required":false,"schema":{"type":"string","format":"date-time","example":"2023-12-31T23:59:59Z"}},{"$ref":"#/components/parameters/fields"}],"responses":{"200":{"description":"A paginated list of notes","content":{"application/json":{"schema":{"type":"object","properties":{"data":{"type":"array","items":{"$ref":"#/components/schemas/Note"}},"links":{"$ref":"#/components/schemas/ListLinks"}}},"examples":{"success":{"summary":"List of notes","value":{"data":[{"id":"123e4567-e89b-12d3-a456-426614174000","type":"textNote","fields":{"name":"Customer feedback","tags":[{"name":"feedback"},{"name":"q1"}],"content":"Customer reported slow loading times on mobile app","owner":{"id":"923e4567-e89b-12d3-a456-426614174008","email":"john.doe@example.com"},"creator":{"id":"e23e4567-e89b-12d3-a456-426614174013","email":"creator@example.com"},"processed":true,"archived":false,"createdAt":"2023-10-01T09:00:00Z","updatedAt":"2023-10-02T14:00:00Z"},"relationships":[{"type":"customer","target":{"id":"f23e4567-e89b-12d3-a456-426614174014","type":"user","links":{"self":"https://api.productboard.com/v2/users/f23e4567-e89b-12d3-a456-426614174014"}}},{"type":"link","target":{"id":"g23e4567-e89b-12d3-a456-426614174015","type":"feature","links":{"self":"https://api.productboard.com/v2/entities/g23e4567-e89b-12d3-a456-426614174015"}}}],"links":{"self":"https://api.productboard.com/v2/notes/123e4567-e89b-12d3-a456-426614174000"}},{"id":"223e4567-e89b-12d3-a456-426614174001","type":"conversationNote","fields":{"name":"Support conversation","content":[{"externalId":"b23e4567-e89b-12d3-a456-426614174010","content":"Hello, I need help with the app","authorName":"John Customer","authorType":"customer","timestamp":"2023-10-01T10:00:00Z"},{"externalId":"c23e4567-e89b-12d3-a456-426614174011","content":"Hi John, how can I help you today?","authorName":"Support Agent","authorType":"agent","timestamp":"2023-10-01T10:05:00Z"}],"tags":[{"name":"support"}],"owner":{"id":"d23e4567-e89b-12d3-a456-426614174012","email":"support@example.com"},"creator":{"id":"e23e4567-e89b-12d3-a456-426614174013","email":"creator@example.com"},"processed":true,"archived":false,"createdAt":"2023-10-01T10:00:00Z","updatedAt":"2023-10-01T10:05:00Z"},"relationships":[{"type":"customer","target":{"id":"h23e4567-e89b-12d3-a456-426614174016","type":"company","links":{"self":"https://api.productboard.com/v2/companies/h23e4567-e89b-12d3-a456-426614174016"}}}],"links":{"self":"https://api.productboard.com/v2/notes/223e4567-e89b-12d3-a456-426614174001"}}],"links":{"next":"https://api.productboard.com/v2/notes?pageCursor=next_cursor_value"}}},"filterByOwnerEmail":{"summary":"List unarchived notes owned by a specific user (filter by owner email)","description":"Example using query parameters: `?archived=false&owner[email]=john.doe@example.com`","value":{"data":[{"id":"123e4567-e89b-12d3-a456-426614174000","type":"textNote","fields":{"name":"Customer feedback","content":"Customer reported slow loading times on mobile app","owner":{"id":"923e4567-e89b-12d3-a456-426614174008","email":"john.doe@example.com"},"creator":{"id":"e23e4567-e89b-12d3-a456-426614174013","email":"creator@example.com"},"processed":false,"archived":false},"links":{"self":"https://api.productboard.com/v2/notes/123e4567-e89b-12d3-a456-426614174000"}}],"links":{"next":null}}},"filterByDateRange":{"summary":"List notes created within a specific date range","description":"Example using query parameters: `?createdFrom=2023-10-01T00:00:00Z&createdTo=2023-12-31T23:59:59Z`","value":{"data":[{"id":"123e4567-e89b-12d3-a456-426614174000","type":"textNote","fields":{"name":"Q4 feedback","content":"Feedback collected during Q4","processed":false,"archived":false},"links":{"self":"https://api.productboard.com/v2/notes/123e4567-e89b-12d3-a456-426614174000"}},{"id":"223e4567-e89b-12d3-a456-426614174001","type":"textNote","fields":{"name":"Another Q4 note","content":"More Q4 feedback","processed":true,"archived":false},"links":{"self":"https://api.productboard.com/v2/notes/223e4567-e89b-12d3-a456-426614174001"}}],"links":{"next":null}}},"filterByUpdateTime":{"summary":"List notes updated after a specific time (for incremental sync)","description":"Example using query parameter: `?updatedFrom=2024-01-01T00:00:00Z`","value":{"data":[{"id":"123e4567-e89b-12d3-a456-426614174000","type":"textNote","fields":{"name":"Recently updated note","content":"This note was recently modified","processed":false,"archived":false},"links":{"self":"https://api.productboard.com/v2/notes/123e4567-e89b-12d3-a456-426614174000"}}],"links":{"next":null}}}}}}},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}}},"/notes/search":{"post":{"tags":["notes"],"summary":"Search notes","description":"Performs a filtered search over notes using a POST request.\nThis endpoint supports the same filtering capabilities as `GET /v2/notes`, but allows more complex filtering through relationships.\n\n> Filtering by owner or creator email requires the `members:pii:read` scope.\n\n### Filter Logic\n\n- Multiple values within a filter use **OR** logic (e.g., customer with id1 OR id2)\n- Different filter types use **AND** logic (e.g., customer AND link filters)\n\n### Relationships\n\nFilter notes by their relationships to customers (users or companies) and links (features):\n\n- `filter.relationships.customer[].id` - Filter by customer or company UUIDs (OR logic within)\n- `filter.relationships.link[].id` - Filter by linked feature UUIDs (OR logic within)\n","operationId":"performNotesSearch","security":[{"BearerAuth":["notes:read"]}],"parameters":[{"name":"pageCursor","in":"query","description":"Cursor for pagination.","required":false,"schema":{"type":"string"}},{"name":"fields[]","in":"query","deprecated":true,"description":"**Deprecated**: Use `return.fields` in the request body instead.\n\nControls which fields are returned in the response.\n","required":false,"schema":{"type":"array","items":{"type":"string"}}}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/NoteSearchRequest"},"examples":{"structured_filter":{"summary":"Structured filter format","value":{"data":{"filter":{"type":"textNote","id":["123e4567-e89b-12d3-a456-426614174000"],"createdAt":{"from":"2024-01-01T00:00:00Z","to":"2024-12-31T23:59:59Z"},"fields":{"owner":[{"id":"223e4567-e89b-12d3-a456-426614174001"}],"tag":[{"name":"important"}],"archived":false,"processed":true},"metadata":{"source":[{"system":"intercom"}]},"relationships":{"customer":[{"id":"323e4567-e89b-12d3-a456-426614174002"}],"link":[{"id":"423e4567-e89b-12d3-a456-426614174003"}]}},"return":{"fields":["name","content","owner","tags"]}}}}}}}},"responses":{"200":{"description":"A paginated list of notes","content":{"application/json":{"schema":{"type":"object","properties":{"data":{"type":"array","items":{"$ref":"#/components/schemas/Note"}},"links":{"$ref":"#/components/schemas/ListLinks"}}}}}},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"422":{"$ref":"#/components/responses/UnprocessableEntityResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}}},"/notes/{id}":{"get":{"tags":["notes"],"summary":"Get note","description":"Retrieves the full details of a specific note by its ID.\n\n> Without the `members:pii:read` scope, owner and creator email fields are returned as `[redacted]`.\n\nBy default, the response includes all non-null fields available in your workspace for that note type\n(e.g. `textNote`, `conversationNote`). You can optimize the response size by using the `fields` query parameter:\n- Use `fields=name,tags,content` to retrieve only specific fields\n- Use `fields=all` to include all fields, even those with null values\n\nYou can use this endpoint to display the entire note content, including metadata such as owner, tags, and relationships.\n\n> Use the [`/v2/notes/configurations`](#/paths/~1v2~1notes~1configurations/get) endpoint\nto discover which fields are available for your workspace.\n","operationId":"getNote","security":[{"BearerAuth":["notes:read"]}],"parameters":[{"name":"id","in":"path","required":true,"description":"Note identifier.","schema":{"type":"string","format":"uuid","example":"123e4567-e89b-12d3-a456-426614174000"}},{"$ref":"#/components/parameters/fields"}],"responses":{"200":{"description":"Note details","content":{"application/json":{"schema":{"type":"object","properties":{"data":{"$ref":"#/components/schemas/Note"}}},"examples":{"text-note":{"summary":"Text note response","value":{"data":{"id":"123e4567-e89b-12d3-a456-426614174000","type":"textNote","createdAt":"2023-10-01T10:00:00Z","updatedAt":"2023-10-15T14:30:00Z","fields":{"name":"My note","tags":[{"name":"sales"},{"name":"q1"}],"content":"This is a sample note content.","owner":{"id":"e23e4567-e89b-12d3-a456-426614174013","email":"owner@example.com"},"creator":{"id":"e23e4567-e89b-12d3-a456-426614174013","email":"creator@example.com"},"processed":true,"archived":false},"relationships":[{"type":"customer","target":{"id":"923e4567-e89b-12d3-a456-426614174008","type":"user","links":{"self":"https://api.productboard.com/v2/users/923e4567-e89b-12d3-a456-426614174008"}}},{"type":"link","target":{"id":"a23e4567-e89b-12d3-a456-426614174009","type":"feature","links":{"self":"https://api.productboard.com/v2/entities/a23e4567-e89b-12d3-a456-426614174009"}}}],"links":{"self":"https://api.productboard.com/v2/notes/123e4567-e89b-12d3-a456-426614174000"}}}},"conversation-note":{"summary":"Conversation note response","value":{"data":{"id":"223e4567-e89b-12d3-a456-426614174001","type":"conversationNote","fields":{"name":"Conversation Note","content":[{"externalId":"323e4567-e89b-12d3-a456-426614174002","content":"hello","authorName":"","authorType":"agent","timestamp":"2023-10-01T11:00:00Z"},{"externalId":"423e4567-e89b-12d3-a456-426614174003","content":"world","authorName":"John Doe","authorType":"customer","timestamp":"2023-10-01T12:00:00Z"}],"tags":[{"name":"support"}],"owner":{"id":"f23e4567-e89b-12d3-a456-426614174014","email":"owner2@example.com"},"creator":{"id":"e23e4567-e89b-12d3-a456-426614174013","email":"creator@example.com"},"processed":false,"archived":false,"createdAt":"2023-10-01T10:00:00Z","updatedAt":"2023-10-01T12:00:00Z"},"relationships":[{"type":"customer","target":{"id":"b23e4567-e89b-12d3-a456-426614174010","type":"company","links":{"self":"https://api.productboard.com/v2/companies/b23e4567-e89b-12d3-a456-426614174010"}}}],"links":{"self":"https://api.productboard.com/v2/notes/223e4567-e89b-12d3-a456-426614174001"}}}},"opportunity-note":{"summary":"Opportunity note response","value":{"data":{"id":"323e4567-e89b-12d3-a456-426614174002","type":"opportunityNote","fields":{"name":"Opportunity Note","tags":[{"name":"sales"}],"content":[{"id":"523e4567-e89b-12d3-a456-426614174004","name":"Amount","value":"1000.1235","fieldType":"number"},{"id":"623e4567-e89b-12d3-a456-426614174005","name":"Description","value":"Test Opportunity","fieldType":"string"},{"id":"723e4567-e89b-12d3-a456-426614174006","name":"Close Date","value":"2023-12-31","fieldType":"string"}],"owner":{"id":"123e4567-e89b-12d3-a456-426614174015","email":"sales.rep@example.com"},"creator":{"id":"e23e4567-e89b-12d3-a456-426614174013","email":"creator@example.com"},"processed":true,"archived":false,"createdAt":"2023-09-15T08:00:00Z","updatedAt":"2023-12-01T16:45:00Z"},"relationships":[{"type":"link","target":{"id":"c23e4567-e89b-12d3-a456-426614174011","type":"initiative","links":{"self":"https://api.productboard.com/v2/entities/c23e4567-e89b-12d3-a456-426614174011"}}}],"links":{"self":"https://api.productboard.com/v2/notes/323e4567-e89b-12d3-a456-426614174002"}}}}}}}},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}},"patch":{"tags":["notes"],"summary":"Update note","description":"Updates the values of one or more fields for an existing note.\n\nYou can update fields using either:\n- **Field Updates**: Replace entire field values using the `fields` object\n- **Patch Operations**: Perform granular updates using the `patch` array with operations (`set`, `clear`, `addItems`, `removeItems`)\n\nUse this endpoint to update note metadata such as name, owner, tags, or content.\nUse the [`/v2/notes/configurations`](#/paths/~1v2~1notes~1configurations/get) endpoint to discover available fields and possible patch operations.\n\n### Patch Operations\n\nThe following patch operations are supported:\n\n| Operation | Description | Supported Fields |\n|-----------|-------------|------------------|\n| `set` | Set a field to a specific value | All fields |\n| `clear` | Clear/reset a field to its default value | `owner`, `tags` |\n| `addItems` | Add items to array fields | `tags`, `content` (conversationNote) |\n| `removeItems` | Remove items from array fields | `tags`, `content` (conversationNote) |\n\n**Field-specific patch operation support:**\n- **owner**: `set`, `clear`\n- **tags**: `set`, `clear`, `addItems`, `removeItems`\n- **archived**: `set`\n- **processed**: `set`\n- **name**: `set`\n- **content** (textNote): `set`\n- **content** (conversationNote): `set`, `addItems`, `removeItems`\n\n### Known Limitations\n\n**Content updates for notes with linked features**: Notes that have content linked to features (via highlights/snippets) cannot have their `content` field updated. Attempting to update the content will return a `422 Unprocessable Entity` error with code `validation.forbidden`. You can still update other fields such as `name`, `owner`, `tags`, `archived`, and `processed` on these notes.\n\n**Archive and Processed Field Behavior**: When you set `archived` to `false`, the note will be set to processed automatically by the system. This is a known limitation where unarchiving a note triggers processing regardless of the previous processed state. The `processed` field will reflect the actual processing status after the unarchive operation.\n","operationId":"updateNote","security":[{"BearerAuth":["notes:write"]}],"parameters":[{"name":"id","in":"path","required":true,"description":"Note identifier.","schema":{"type":"string","format":"uuid"}}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"type":"object","required":["data"],"properties":{"data":{"type":"object","properties":{"fields":{"$ref":"#/components/schemas/NoteCreateOrUpdateFields"},"patch":{"$ref":"#/components/schemas/NotePatch"}}}},"examples":[{"summary":"Update note fields","value":{"data":{"fields":{"name":"New name","tags":["sales","onboarding"],"content":"<p>Updated content of the note</p>"}}}},{"summary":"Set owner using patch operation","value":{"data":{"patch":[{"op":"set","path":"owner","value":{"email":"john.doe@example.com"}}]}}},{"summary":"Clear owner using patch operation","value":{"data":{"patch":[{"op":"clear","path":"owner"}]}}},{"summary":"Add conversation parts using patch operation","value":{"data":{"patch":[{"op":"addItems","path":"content","value":[{"authorType":"customer","authorName":"John","content":"Hi, I have a question","timestamp":"2025-07-01T09:00:00Z"}]},{"op":"removeItems","path":"content","value":["123e4567-e89b-12d3-a456-426614174000"]}]}}},{"summary":"Set tags using patch operation","value":{"data":{"patch":[{"op":"set","path":"tags","value":[{"name":"support"},{"name":"urgent"}]}]}}},{"summary":"Add tags using patch operation","value":{"data":{"patch":[{"op":"addItems","path":"tags","value":[{"name":"new-tag"}]}]}}},{"summary":"Remove tags using patch operation","value":{"data":{"patch":[{"op":"removeItems","path":"tags","value":[{"name":"old-tag"}]}]}}},{"summary":"Clear tags using patch operation","value":{"data":{"patch":[{"op":"clear","path":"tags"}]}}},{"summary":"Set archived status using patch operation","value":{"data":{"patch":[{"op":"set","path":"archived","value":true}]}}},{"summary":"Set processed status using patch operation","value":{"data":{"patch":[{"op":"set","path":"processed","value":true}]}}}]}}}},"responses":{"200":{"description":"Note updated successfully","content":{"application/json":{"schema":{"$ref":"#/components/schemas/NoteReferenceResponse"},"examples":{"text-note":{"summary":"Text note updated","value":{"data":{"id":"123e4567-e89b-12d3-a456-426614174000","type":"textNote","links":{"self":"https://api.productboard.com/v2/notes/123e4567-e89b-12d3-a456-426614174000"}}}},"conversation-note":{"summary":"Conversation note updated","value":{"data":{"id":"223e4567-e89b-12d3-a456-426614174000","type":"conversationNote","links":{"self":"https://api.productboard.com/v2/notes/223e4567-e89b-12d3-a456-426614174000"}}}}}}}},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"422":{"$ref":"#/components/responses/UnprocessableEntityResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}},"delete":{"tags":["notes"],"summary":"Delete note","description":"Permanently deletes a note from your workspace. This action is irreversible and should be used with caution.\n\nOnce deleted, the note and all of its content, metadata, and relationships\nwill be removed and cannot be recovered.\n\n> To perform a soft-delete (archiving), use an update call instead to set the `archived` flag.\n","operationId":"deleteNote","security":[{"BearerAuth":["notes:delete"]}],"parameters":[{"name":"id","in":"path","required":true,"description":"Note identifier.","schema":{"type":"string","format":"uuid","example":"123e4567-e89b-12d3-a456-426614174000"}}],"responses":{"204":{"$ref":"#/components/responses/NoContentResponse"},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"422":{"$ref":"#/components/responses/UnprocessableEntityResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}}},"/notes/{id}/relationships":{"get":{"tags":["notes"],"summary":"List relationships","operationId":"listNoteRelationships","security":[{"BearerAuth":["notes:read"]}],"description":"Retrieves all relationships connected to a specific note.\n\nThis includes:\n- Customer relationship (either a User or Company entity)\n- Product link relationships (e.g. linked features)\n\n### Customer relationship rules\n- A note can have a relationship to **exactly one customer entity** (User or Company).\n- If the note has a **User** as the customer, and that User is associated with a Company,\n  only the **User** is returned.\n- If the note has a **User** without a Company, the User is returned.\n- If the note has a **Company**, the Company is returned.\n- If the note has no customer relationship, an empty array is returned.\n\n### Product link relationships\n- Notes can be linked to **multiple Product Management entities** (e.g. features, components).\n- All such relationships are returned in the same response.\n\n> To discover supported relationship types, use the [`/v2/notes/configurations`](#/paths/~1v2~1notes~1configurations/get) endpoint.\n","parameters":[{"name":"id","in":"path","required":true,"description":"Note identifier.","schema":{"type":"string","format":"uuid"}},{"name":"pageCursor","in":"query","description":"Cursor for pagination through relationships","required":false,"schema":{"type":"string"}},{"name":"limit","in":"query","description":"Maximum number of relationships to return per page","required":false,"schema":{"type":"integer","minimum":1}},{"name":"type","in":"query","description":"Filter relationships by type. When provided, only relationships of the specified type are returned.\nIf not provided, all relationship types are returned.\n","required":false,"schema":{"type":"string","enum":["customer","link"]}},{"name":"target[type]","in":"query","description":"Filter relationships by the target entity type. When provided, only relationships\nwhere the target matches the specified entity type are returned.\nIf not provided, all target types are returned.\n\nAvailable values:\n- `user`: Customer relationships where the target is a user\n- `company`: Customer relationships where the target is a company\n- `feature`: Link relationships where the target is a feature\n- `subfeature`: Link relationships where the target is a subfeature\n- `product`: Link relationships where the target is a product\n- `component`: Link relationships where the target is a component\n","required":false,"schema":{"type":"string","enum":["user","company","feature","subfeature","product","component"]}}],"responses":{"200":{"description":"A paginated list of relationships","content":{"application/json":{"schema":{"type":"object","properties":{"data":{"type":"array","items":{"$ref":"#/components/schemas/NoteRelationship"}},"links":{"type":"object","properties":{"next":{"type":["string","null"],"description":"URL to the next page of relationships. Null when all relationships are returned.\n"}}}}},"examples":{"example":{"summary":"Example relationships response","value":{"data":[{"type":"customer","target":{"id":"123e4567-e89b-12d3-a456-426614174000","type":"user","links":{"self":"https://api.productboard.com/v2/users/123e4567-e89b-12d3-a456-426614174000"}}},{"type":"link","target":{"id":"223e4567-e89b-12d3-a456-426614174001","type":"feature","links":{"self":"https://api.productboard.com/v2/entities/223e4567-e89b-12d3-a456-426614174001"}}}],"links":{"next":null}}}}}}},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}},"post":{"tags":["notes"],"summary":"Create relationship","description":"Creates a new relationship between a note and another entity.\n\nYou can link a note to:\n- A Product Management entity (e.g. feature, component, initiative)\n- A customer entity (company or user)\n\nThis is useful for capturing customer feedback and tying it to the right product link,\nor for attributing a note to a specific customer.\n\n> If a Customer relationship already exists (user or company), it will be replaced.\nNotes can have **one customer** relationship and **multiple product link** relationships.\n","operationId":"createNoteRelationship","security":[{"BearerAuth":["notes:write"]}],"parameters":[{"name":"id","in":"path","required":true,"description":"Note identifier.","schema":{"type":"string","format":"uuid"}}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/RelationshipRequest"},"examples":{"customer_relationship":{"summary":"Create customer relationship","value":{"data":{"type":"customer","target":{"id":"123e4567-e89b-12d3-a456-426614174000","type":"user"}}}},"link_relationship":{"summary":"Create Product link relationship","value":{"data":{"type":"link","target":{"id":"223e4567-e89b-12d3-a456-426614174001","type":"link"}}}}}}}},"responses":{"201":{"description":"Relationship created successfully","content":{"application/json":{"schema":{"type":"object","properties":{"data":{"type":"object","properties":{"type":{"type":"string","example":"customer"},"target":{"$ref":"#/components/schemas/EntityReferenceResponse"}}}}},"examples":{"customer_relationship_created":{"summary":"Customer relationship created","value":{"data":{"type":"customer","target":{"id":"123e4567-e89b-12d3-a456-426614174000","type":"user","links":{"self":"https://api.productboard.com/v2/users/123e4567-e89b-12d3-a456-426614174000"}}}}},"link_relationship_created":{"summary":"Product link relationship created","value":{"data":{"type":"link","target":{"id":"223e4567-e89b-12d3-a456-426614174001","type":"feature","links":{"self":"https://api.productboard.com/v2/entities/223e4567-e89b-12d3-a456-426614174001"}}}}}}}}},"400":{"$ref":"#/components/responses/BadRequestResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"422":{"$ref":"#/components/responses/UnprocessableEntityResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}}},"/notes/{id}/relationships/customer":{"put":{"tags":["notes"],"summary":"Set customer relationship","description":"Sets or replaces the customer relationship of a note.\n\n* A note can be linked to **one customer only** — either a User or a Company.\n* If a customer relationship already exists, it will be **replaced** with the new one provided.\n\nThis is useful for attributing feedback to the correct user or company, especially when syncing notes from support systems or CRMs.\n\n> To remove the customer relationship completely, use the `DELETE /v2/notes/{id}/relationships/customer/{targetId}` endpoint.\n","operationId":"replaceNoteCustomerRelationship","security":[{"BearerAuth":["notes:write"]}],"parameters":[{"name":"id","in":"path","required":true,"schema":{"type":"string","format":"uuid"},"description":"Note identifier."}],"requestBody":{"required":true,"content":{"application/json":{"schema":{"$ref":"#/components/schemas/CustomerRelationshipReplaceRequest"},"examples":{"link_user":{"summary":"Link a user to a note","value":{"data":{"target":{"type":"user","id":"123e