 as it is ignored during deletion.\nThe endpoint will remove all customer relationships from the note regardless of the targetId value provided.\n","parameters":[{"name":"id","in":"path","required":true,"schema":{"type":"string","format":"uuid","example":"123e4567-e89b-12d3-a456-426614174000"},"description":"Note identifier."},{"name":"targetType","in":"path","required":true,"schema":{"type":"string","enum":["customer","link"],"example":"link"},"description":"Relationship type to delete.\n* `customer`: Delete customer relationship (user or company)\n* `link`: Delete link relationship (feature, component or product entity)\n"},{"name":"targetId","in":"path","required":true,"schema":{"type":"string","format":"uuid","example":"223e4567-e89b-12d3-a456-426614174001"},"description":"UUID of the target entity (customer, organization, or link). For customer relationships, this is optional for backward compatibility."}],"responses":{"204":{"$ref":"#/components/responses/NoContentResponse"},"401":{"$ref":"#/components/responses/UnauthorizedResponse"},"403":{"$ref":"#/components/responses/ForbiddenResponse"},"404":{"$ref":"#/components/responses/NotFoundResponse"},"408":{"$ref":"#/components/responses/RequestTimeoutResponse"},"422":{"$ref":"#/components/responses/UnprocessableEntityResponse"},"429":{"$ref":"#/components/responses/TooManyRequestsResponse"},"500":{"$ref":"#/components/responses/InternalServerErrorResponse"}}}}},"components":{"securitySchemes":{"BearerAuth":{"type":"http","scheme":"bearer","bearerFormat":"JWT","description":"API token authentication. Use your API token as the value of the Authorization header"},"OAuth2":{"type":"oauth2","description":"OAuth 2.0 authentication. Use this for user-authorized access to Productboard API.","flows":{"authorizationCode":{"authorizationUrl":"https://app.productboard.com/oauth/authorize","tokenUrl":"https://app.productboard.com/oauth/token","scopes":{"notes:read":"Read access to notes","notes:write":"Write access to create